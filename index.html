async function openHistoriaNotesModal(clientId, idx) {
  ensureModalRoot();
  const historias = await getHistorias(clientId, STATE.currentMonth);
  const h = historias[idx];
  const notas = h.notasInternas || [];
  const session = STATE.session;

  let changed = false;
  notas.forEach(n => {
    if (!n.vistoPor) n.vistoPor = [];
    if (!n.vistoPor.includes(session.username)) {
      n.vistoPor.push(session.username);
      changed = true;
    }
  });
  if (changed) await saveHistorias(clientId, STATE.currentMonth, historias);

  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay show" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-title">Notas internas — historia</div>
        <div style="margin-bottom:18px; max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;">
          ${notas.length === 0 ? '<div style="font-size:13px;color:var(--tierra);font-style:italic;">Todavía no hay notas en esta historia.</div>' : ''}
          ${notas.map(n => `
            <div style="background:var(--arena);border-radius:var(--radius);padding:10px 12px;">
              <div style="font-size:11px;font-weight:700;color:var(--tierra-deep);margin-bottom:3px;">${esc(n.author)} · ${formatFechaHora(n.date)}</div>
              <div style="font-size:13px;color:var(--tinta);">${esc(n.text)}</div>
            </div>
          `).join('')}
        </div>
        <div class="modal-field">
          <label>Agregar nota</label>
          <textarea id="h-newnote" placeholder="Ej: falta material de la propiedad..."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-sm" id="m-cancel">Cerrar</button>
          <button class="btn-sm primary" id="h-addnote">Agregar nota</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('m-cancel').addEventListener('click', () => { closeModal(); renderPostGrid(); });
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'modal-overlay') { closeModal(); renderPostGrid(); }
  });
  document.getElementById('h-addnote').addEventListener('click', async () => {
    const text = document.getElementById('h-newnote').value.trim();
    if (!text) return;
    const fresh = await getHistorias(clientId, STATE.currentMonth);
    if (!fresh[idx].notasInternas) fresh[idx].notasInternas = [];
    fresh[idx].notasInternas.push({ author: session.name, date: new Date().toISOString(), text, vistoPor: [session.username] });
    await saveHistorias(clientId, STATE.currentMonth, fresh);
    closeModal();
    renderPostGrid();
  });
}

/* ============================================================
   ADMIN: Clients & Plans tab
   ============================================================ */
async function renderClientsTab(container) {
  container.innerHTML = `
    <div class="section-block">
      <div class="section-title">
        Clientes
        <button class="btn-sm primary" id="add-client">+ Nuevo cliente</button>
      </div>
      <table class="admin-table">
        <thead><tr><th>Cliente</th><th>Familia</th><th>Plan default</th><th>LinkedIn</th><th>Color</th></tr></thead>
        <tbody id="clients-tbody"></tbody>
      </table>
      <div style="font-size:12px;color:var(--tierra-deep);margin-top:8px;">Cada mes se carga automáticamente con el plan default; el desplegable del calendario te permite cambiarlo puntualmente para un mes en particular.</div>
    </div>
    <div class="section-block">
      <div class="section-title">
        Planes
        <button class="btn-sm primary" id="add-plan">+ Nuevo plan</button>
      </div>
      <table class="admin-table">
        <thead><tr><th>Plan</th><th>Familia</th><th>Feed</th><th>Historias</th><th>Precio</th><th>Detalle</th></tr></thead>
        <tbody id="plans-tbody"></tbody>
      </table>
    </div>
  `;

  const familyLabels = { solo: 'Cata sola (Paula)', equipo: 'Cata + Tamy' };

  const ctbody = document.getElementById('clients-tbody');
  ctbody.innerHTML = Object.entries(STATE.clients).map(([id, c]) => {
    const plansForThisFamily = Object.entries(STATE.plans).filter(([pid, p]) => p.family === c.family);
    return `
    <tr>
      <td class="name-cell">${esc(c.name)}</td>
      <td>
        <select data-client-family="${id}">
          <option value="solo" ${c.family==='solo'?'selected':''}>Cata sola</option>
          <option value="equipo" ${c.family==='equipo'?'selected':''}>Cata + Tamy</option>
        </select>
      </td>
      <td>
        <select data-client-plandefault="${id}">
          <option value="">Sin definir</option>
          ${plansForThisFamily.map(([pid, p]) => `<option value="${pid}" ${pid===c.planDefault?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </td>
      <td>${c.allowLinkedin ? 'Sí' : 'No'}</td>
      <td><span class="swatch" style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${c.color};vertical-align:middle"></span></td>
    </tr>
  `;
  }).join('');

  ctbody.querySelectorAll('[data-client-family]').forEach(sel => {
    sel.addEventListener('change', async () => {
      const cid = sel.dataset.clientFamily;
      STATE.clients[cid].family = sel.value;
      STATE.clients[cid].planDefault = null; // reset default plan since family changed
      await storeSet('app:clients', STATE.clients, true);
      renderClientsTab(document.getElementById('tab-content'));
    });
  });

  ctbody.querySelectorAll('[data-client-plandefault]').forEach(sel => {
    sel.addEventListener('change', async () => {
      const cid = sel.dataset.clientPlandefault;
      STATE.clients[cid].planDefault = sel.value || null;
      await storeSet('app:clients', STATE.clients, true);
    });
  });

  const ptbody = document.getElementById('plans-tbody');
  ptbody.innerHTML = Object.entries(STATE.plans).map(([id, p]) => `
    <tr>
      <td class="name-cell">${esc(p.name)}</td>
      <td>${familyLabels[p.family] || p.family}</td>
      <td>${p.piezasFeed}</td>
      <td>${p.numHistorias}</td>
      <td>$${p.price.toLocaleString('es-AR')}</td>
      <td style="font-size:12px;color:var(--tierra-deep);">${esc(p.detail)}</td>
    </tr>
  `).join('');

  document.getElementById('add-client').addEventListener('click', () => openNewClientModal());
  document.getElementById('add-plan').addEventListener('click', () => openNewPlanModal());
}

function openNewClientModal() {
  ensureModalRoot();
  const root = document.getElementById('modal-root');
  const colors = ['#B6553A','#4F7A8B','#6B7A5E','#C99A3C','#8B6F4E','#A85C7E'];
  const randomColor = colors[Math.floor(Math.random()*colors.length)];
  root.innerHTML = `
    <div class="modal-overlay show" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-title">Nuevo cliente</div>
        <div class="modal-field"><label>Nombre del cliente</label><input type="text" id="nc-name"></div>
        <div class="modal-field"><label>Familia de trabajo</label>
          <select id="nc-family">
            <option value="equipo">Cata + Tamy</option>
            <option value="solo">Cata sola</option>
          </select>
        </div>
        <div class="modal-field"><label><input type="checkbox" id="nc-linkedin" style="width:auto;margin-right:6px;">Habilitar LinkedIn como plataforma</label></div>
        <div class="modal-field"><label>Usuario de acceso (login)</label><input type="text" id="nc-user" placeholder="ej: juanperez"></div>
        <div class="modal-field"><label>Contraseña</label><input type="text" id="nc-pass" placeholder="ej: juan2026"></div>
        <input type="hidden" id="nc-color" value="${randomColor}">
        <div class="modal-actions">
          <button class="btn-sm" id="m-cancel">Cancelar</button>
          <button class="btn-sm primary" id="nc-save">Crear cliente</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('m-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target.id==='modal-overlay') closeModal(); });
  document.getElementById('nc-save').addEventListener('click', async () => {
    const name = document.getElementById('nc-name').value.trim();
    const family = document.getElementById('nc-family').value;
    const allowLinkedin = document.getElementById('nc-linkedin').checked;
    const username = document.getElementById('nc-user').value.trim().toLowerCase();
    const password = document.getElementById('nc-pass').value;
    if (!name || !username || !password) return;
    const clientId = username;
    STATE.clients[clientId] = { name, family, allowLinkedin, color: document.getElementById('nc-color').value, planDefault: null };
    STATE.users[username] = { password, role: 'client', name, clientId };
    await storeSet('app:clients', STATE.clients, true);
    await storeSet('app:users', STATE.users, true);
    closeModal();
    renderClientsTab(document.getElementById('tab-content'));
  });
}

function openNewPlanModal() {
  ensureModalRoot();
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay show" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-title">Nuevo plan</div>
        <div class="modal-field"><label>Nombre del plan</label><input type="text" id="np-name" placeholder="ej: Estrategia Base"></div>
        <div class="modal-field"><label>Familia de trabajo</label>
          <select id="np-family">
            <option value="equipo">Cata + Tamy</option>
            <option value="solo">Cata sola</option>
          </select>
        </div>
        <div class="modal-field"><label>Piezas de feed por mes (posts/carruseles/reels)</label><input type="number" id="np-feed" value="12" min="0"></div>
        <div class="modal-field"><label>Cantidad de tarjetas de historia por mes</label><input type="number" id="np-historias" value="8" min="0"></div>
        <div class="modal-field"><label>Precio mensual ($)</label><input type="number" id="np-price" value="190000" min="0" step="1000"></div>
        <div class="modal-field"><label>Detalle / descripción</label><textarea id="np-detail" placeholder="Ej: 12 piezas mensuales de feed + 8 historias"></textarea></div>
        <div class="modal-actions">
          <button class="btn-sm" id="m-cancel">Cancelar</button>
          <button class="btn-sm primary" id="np-save">Crear plan</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('m-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target.id==='modal-overlay') closeModal(); });
  document.getElementById('np-save').addEventListener('click', async () => {
    const name = document.getElementById('np-name').value.trim();
    const family = document.getElementById('np-family').value;
    const piezasFeed = parseInt(document.getElementById('np-feed').value, 10) || 0;
    const numHistorias = parseInt(document.getElementById('np-historias').value, 10) || 0;
    const price = parseInt(document.getElementById('np-price').value, 10) || 0;
    const detail = document.getElementById('np-detail').value.trim();
    if (!name) return;
    const planId = 'plan_' + Date.now();
    STATE.plans[planId] = { name, family, piezasFeed, numHistorias, price, detail };
    await storeSet('app:plans', STATE.plans, true);
    closeModal();
    renderClientsTab(document.getElementById('tab-content'));
  });
}
